<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hand Drawing</title>

  <!-- MediaPipe Hands -->
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/control_utils/control_utils.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #000000;
      height: 100vh;
      overflow: hidden;
    }

    /* ── Main area ───────────────────────────────────────────────────────── */
    #main {
      width: 100vw;
      height: 100vh;
      position: relative;
      overflow: hidden;
    }

    /* Drawing canvas */
    #drawCanvas {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      background: #000000;
      touch-action: none;
    }

    /* Webcam feed – hidden */
    #videoEl { display: none; }

    /* Skeleton overlay */
    #skelCanvas {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
    }

    /* ── Cursor dot ──────────────────────────────────────────────────────── */
    #cursor {
      position: absolute;
      width: 16px; height: 16px;
      border-radius: 50%;
      background: #FF6600;
      pointer-events: none;
      transform: translate(-50%, -50%);
      transition: width .08s, height .08s, background .08s, box-shadow .08s;
      box-shadow: 0 0 10px 3px rgba(255,102,0,0.8);
      z-index: 20;
      display: none;
    }

    /* Cursor turns neon blue when grabbing */
    #cursor.grabbing {
      width: 22px; height: 22px;
      background: #00BFFF;
      box-shadow: 0 0 16px 5px rgba(0,191,255,0.8);
    }

    /* ── HUD ─────────────────────────────────────────────────────────────── */
    #hud {
      position: absolute;
      bottom: 16px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.6);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 12px;
      padding: 6px 18px;
      font-size: .8rem;
      letter-spacing: .5px;
      color: #FF6600;
      pointer-events: none;
      z-index: 30;
      font-family: 'Segoe UI', system-ui, sans-serif;
    }

    /* ── Camera permission notice ────────────────────────────────────────── */
    #camNotice {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      background: #000000;
      z-index: 50;
      font-family: 'Segoe UI', system-ui, sans-serif;
      color: #ffffff;
      text-align: center;
      padding: 24px;
    }
    #camNotice p { max-width: 320px; opacity: .65; line-height: 1.6; font-size: .9rem; }
    #startBtn {
      padding: 10px 32px;
      border-radius: 24px;
      border: 2px solid #FF6600;
      background: transparent;
      color: #FF6600;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background .2s, color .2s;
    }
    #startBtn:hover { background: #FF6600; color: #000; }
  </style>
</head>
<body>

<div id="main">
  <canvas id="drawCanvas"></canvas>
  <video  id="videoEl" playsinline autoplay muted></video>
  <canvas id="skelCanvas"></canvas>
  <div    id="cursor"></div>
  <div    id="hud">Waiting for hand…</div>

  <div id="camNotice">
    <div style="font-size:3rem">✋</div>
    <h2 style="font-size:1.2rem;font-weight:700;color:#FF6600">Hand Drawing</h2>
    <p>☝️ Point with index finger to draw<br>🤏 Pinch to grab &amp; move</p>
    <button id="startBtn">Enable Camera</button>
    <p style="font-size:.75rem">Camera stays on your device — nothing is uploaded.</p>
  </div>
</div>

<script>
/* ═══════════════════════════════════════════════════════════════════════════
   Hand Drawing – index finger draws neon orange, pinch to move (neon blue)
   ═══════════════════════════════════════════════════════════════════════════ */

const DRAW_COLOUR = '#FF6600'; // neon orange
const GRAB_COLOUR = '#00BFFF'; // neon blue (shown when moving grabbed piece)
const BRUSH_SIZE  = 8;

const hudEl      = document.getElementById('hud');
const cursorEl   = document.getElementById('cursor');
const camNotice  = document.getElementById('camNotice');
const startBtn   = document.getElementById('startBtn');
const drawCanvas = document.getElementById('drawCanvas');
const skelCanvas = document.getElementById('skelCanvas');
const videoEl    = document.getElementById('videoEl');
const mainEl     = document.getElementById('main');

const drawCtx = drawCanvas.getContext('2d');
const skelCtx = skelCanvas.getContext('2d');

/* ── Undo history ───────────────────────────────────────────────────────── */
const MAX_UNDO  = 30;
const undoStack = [];

function saveUndoState() {
  undoStack.push(drawCtx.getImageData(0, 0, drawCanvas.width, drawCanvas.height));
  if (undoStack.length > MAX_UNDO) undoStack.shift();
}

// Ctrl+Z / Cmd+Z to undo
document.addEventListener('keydown', e => {
  if ((e.ctrlKey || e.metaKey) && e.key === 'z') {
    e.preventDefault();
    if (undoStack.length === 0) return;
    drawCtx.putImageData(undoStack.pop(), 0, 0);
    hudEl.textContent = '↩️ Undone';
  }
});

/* ── Grab / drag state ──────────────────────────────────────────────────── */
let grabCanvas = null;
let grabActive = false;
const GRAB_RADIUS = 80;

function startGrab(cx, cy) {
  const r  = GRAB_RADIUS;
  const sw = r * 2;
  const sh = r * 2;
  const sx = Math.round(cx - r);
  const sy = Math.round(cy - r);

  // Capture the circular region into a temp canvas
  grabCanvas = document.createElement('canvas');
  grabCanvas.width  = sw;
  grabCanvas.height = sh;
  const gc = grabCanvas.getContext('2d');
  gc.save();
  gc.beginPath();
  gc.arc(r, r, r, 0, Math.PI * 2);
  gc.clip();
  gc.drawImage(drawCanvas, sx, sy, sw, sh, 0, 0, sw, sh);
  gc.restore();

  // Tint the grabbed region to neon blue so it shows blue while dragging
  gc.globalCompositeOperation = 'source-in';
  gc.fillStyle = GRAB_COLOUR;
  gc.fillRect(0, 0, sw, sh);
  gc.globalCompositeOperation = 'source-over';

  // Erase the lifted region from the main canvas
  drawCtx.save();
  drawCtx.globalCompositeOperation = 'destination-out';
  drawCtx.beginPath();
  drawCtx.arc(cx, cy, r, 0, Math.PI * 2);
  drawCtx.fill();
  drawCtx.restore();

  grabActive = true;
  cursorEl.classList.add('grabbing');
}

function dropGrab(cx, cy) {
  if (!grabActive || !grabCanvas) return;
  const r = GRAB_RADIUS;

  // Stamp the (neon-blue-tinted) grabbed region at the new position
  drawCtx.save();
  drawCtx.globalCompositeOperation = 'source-over';
  drawCtx.beginPath();
  drawCtx.arc(cx, cy, r, 0, Math.PI * 2);
  drawCtx.clip();
  drawCtx.drawImage(grabCanvas, cx - r, cy - r);
  drawCtx.restore();

  grabCanvas = null;
  grabActive = false;
  cursorEl.classList.remove('grabbing');
}

function drawGrabPreview(cx, cy) {
  if (!grabActive || !grabCanvas) return;
  const r = GRAB_RADIUS;

  skelCtx.save();
  skelCtx.beginPath();
  skelCtx.arc(cx, cy, r, 0, Math.PI * 2);
  skelCtx.clip();
  skelCtx.drawImage(grabCanvas, cx - r, cy - r);
  skelCtx.restore();

  // Neon blue dashed border
  skelCtx.save();
  skelCtx.beginPath();
  skelCtx.arc(cx, cy, r, 0, Math.PI * 2);
  skelCtx.strokeStyle = GRAB_COLOUR;
  skelCtx.lineWidth   = 2.5;
  skelCtx.setLineDash([8, 4]);
  skelCtx.stroke();
  skelCtx.setLineDash([]);
  skelCtx.restore();
}

/* ── Resize canvases ────────────────────────────────────────────────────── */
function resizeCanvases() {
  const w = mainEl.clientWidth;
  const h = mainEl.clientHeight;
  const tmp = document.createElement('canvas');
  tmp.width  = drawCanvas.width  || w;
  tmp.height = drawCanvas.height || h;
  tmp.getContext('2d').drawImage(drawCanvas, 0, 0);
  drawCanvas.width  = w; drawCanvas.height = h;
  skelCanvas.width  = w; skelCanvas.height = h;
  drawCtx.drawImage(tmp, 0, 0);
}
resizeCanvases();
window.addEventListener('resize', resizeCanvases);

/* ── Drawing state ──────────────────────────────────────────────────────── */
let isDrawing = false;
let lastX     = null;
let lastY     = null;

function paintAt(x, y) {
  drawCtx.lineCap   = 'round';
  drawCtx.lineJoin  = 'round';
  drawCtx.globalCompositeOperation = 'source-over';
  drawCtx.strokeStyle = DRAW_COLOUR;
  drawCtx.lineWidth   = BRUSH_SIZE;

  if (lastX !== null) {
    drawCtx.beginPath();
    drawCtx.moveTo(lastX, lastY);
    drawCtx.lineTo(x, y);
    drawCtx.stroke();
  } else {
    drawCtx.beginPath();
    drawCtx.arc(x, y, BRUSH_SIZE / 2, 0, Math.PI * 2);
    drawCtx.fillStyle = DRAW_COLOUR;
    drawCtx.fill();
  }

  lastX = x; lastY = y;
}

/* ── Gesture classification ─────────────────────────────────────────────── */
function isFingerUp(lm, tipIdx, pipIdx) {
  return lm[tipIdx].y < lm[pipIdx].y;
}

function classifyGesture(lm) {
  const indexUp  = isFingerUp(lm, 8,  6);
  const middleUp = isFingerUp(lm, 12, 10);
  const ringUp   = isFingerUp(lm, 16, 14);
  const pinkyUp  = isFingerUp(lm, 20, 18);

  if (indexUp && !middleUp && !ringUp && !pinkyUp) return 'draw';  // ☝️

  // Pinch: index tip close to thumb tip
  const dx = lm[8].x - lm[4].x;
  const dy = lm[8].y - lm[4].y;
  if (Math.sqrt(dx * dx + dy * dy) < 0.06) return 'pinch';        // 🤏

  return 'unknown';
}

/* Smoothing buffer for gesture stability */
const gestureHistory = [];
const GESTURE_SMOOTH = 5;

function smoothGesture(g) {
  gestureHistory.push(g);
  if (gestureHistory.length > GESTURE_SMOOTH) gestureHistory.shift();
  const counts = {};
  gestureHistory.forEach(x => counts[x] = (counts[x] || 0) + 1);
  return Object.keys(counts).reduce((a, b) => counts[a] > counts[b] ? a : b);
}

/* Smoothing for cursor position */
let smoothX = 0, smoothY = 0;
const CURSOR_ALPHA = 0.4;

/* ── MediaPipe Hands ────────────────────────────────────────────────────── */
const hands = new Hands({
  locateFile: f => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${f}`,
});
hands.setOptions({
  maxNumHands:            1,
  modelComplexity:        1,
  minDetectionConfidence: 0.7,
  minTrackingConfidence:  0.6,
});
hands.onResults(onResults);

function onResults(results) {
  skelCtx.clearRect(0, 0, skelCanvas.width, skelCanvas.height);

  if (!results.multiHandLandmarks || results.multiHandLandmarks.length === 0) {
    cursorEl.style.display = 'none';
    isDrawing = false; lastX = null; lastY = null;
    if (grabActive) dropGrab(smoothX, smoothY);
    hudEl.textContent = 'No hand detected…';
    return;
  }

  const lm = results.multiHandLandmarks[0];

  // Draw hand skeleton
  drawConnectors(skelCtx, lm, HAND_CONNECTIONS, { color: 'rgba(255,102,0,0.35)', lineWidth: 2 });
  drawLandmarks(skelCtx, lm, { color: '#FF6600', fillColor: 'rgba(255,102,0,0.3)', radius: 3 });

  // Map index-finger tip to canvas coords (mirrored)
  const tipRaw = lm[8];
  const canvasX = (1 - tipRaw.x) * drawCanvas.width;
  const canvasY =       tipRaw.y  * drawCanvas.height;

  smoothX += CURSOR_ALPHA * (canvasX - smoothX);
  smoothY += CURSOR_ALPHA * (canvasY - smoothY);

  cursorEl.style.display = 'block';
  cursorEl.style.left    = `${smoothX}px`;
  cursorEl.style.top     = `${smoothY}px`;

  const gesture = smoothGesture(classifyGesture(lm));

  // Drop grab when pinch is released
  if (grabActive && gesture !== 'pinch') {
    dropGrab(smoothX, smoothY);
  }

  switch (gesture) {
    case 'draw':
      if (!isDrawing) saveUndoState();
      paintAt(smoothX, smoothY);
      isDrawing = true;
      hudEl.textContent = '☝️ Drawing';
      break;

    case 'pinch':
      if (!grabActive) startGrab(smoothX, smoothY);
      drawGrabPreview(smoothX, smoothY);
      isDrawing = false; lastX = null; lastY = null;
      hudEl.textContent = '🤏 Moving…';
      break;

    default:
      isDrawing = false; lastX = null; lastY = null;
      hudEl.textContent = '✋ Ready';
  }
}

/* ── Camera start ────────────────────────────────────────────────────────── */
startBtn.addEventListener('click', async () => {
  try {
    const stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: 'user', width: 1280, height: 720 },
    });
    videoEl.srcObject = stream;
    await videoEl.play();

    camNotice.style.display = 'none';

    const camera = new Camera(videoEl, {
      onFrame: async () => { await hands.send({ image: videoEl }); },
      width: 1280,
      height: 720,
    });
    camera.start();
    hudEl.textContent = 'Show your hand…';
  } catch (err) {
    camNotice.querySelector('p').textContent =
      `Camera error: ${err.message}. Please allow camera access and reload.`;
  }
});

/* ── Mouse / touch fallback ─────────────────────────────────────────────── */
let mouseDown = false;

// Right-click triggers grab/move; left click draws (mirrors hand gestures)
drawCanvas.addEventListener('pointerdown', e => {
  e.preventDefault();
  mouseDown = true;
  lastX = null; lastY = null;
  saveUndoState();
  if (e.button === 2) {
    startGrab(e.offsetX, e.offsetY);
  } else {
    paintAt(e.offsetX, e.offsetY);
  }
});

drawCanvas.addEventListener('pointermove', e => {
  if (!mouseDown) return;
  if (grabActive) {
    skelCtx.clearRect(0, 0, skelCanvas.width, skelCanvas.height);
    drawGrabPreview(e.offsetX, e.offsetY);
  } else {
    paintAt(e.offsetX, e.offsetY);
  }
});

drawCanvas.addEventListener('pointerup', e => {
  if (grabActive) {
    skelCtx.clearRect(0, 0, skelCanvas.width, skelCanvas.height);
    dropGrab(e.offsetX, e.offsetY);
  }
  mouseDown = false; lastX = null; lastY = null;
});

drawCanvas.addEventListener('pointerleave', e => {
  if (grabActive) {
    skelCtx.clearRect(0, 0, skelCanvas.width, skelCanvas.height);
    dropGrab(e.offsetX, e.offsetY);
  }
  mouseDown = false; lastX = null; lastY = null;
});

// Prevent context menu on right-click so grab works smoothly
drawCanvas.addEventListener('contextmenu', e => e.preventDefault());
</script>
</body>
</html>
